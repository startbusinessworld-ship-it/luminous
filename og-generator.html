<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>*{margin:0;padding:0;}body{background:#333;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;}</style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Background
ctx.fillStyle = '#0A0A0A';
ctx.fillRect(0, 0, 1200, 630);

// Grid
ctx.strokeStyle = 'rgba(200,16,46,0.06)';
ctx.lineWidth = 1;
for(let x = 0; x <= 1200; x += 80) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,630); ctx.stroke(); }
for(let y = 0; y <= 630; y += 80) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1200,y); ctx.stroke(); }

// Radial glow
const grd = ctx.createRadialGradient(600, 0, 0, 600, 0, 500);
grd.addColorStop(0, 'rgba(200,16,46,0.1)');
grd.addColorStop(1, 'rgba(10,10,10,0)');
ctx.fillStyle = grd;
ctx.fillRect(0, 0, 1200, 630);

// Top red line
ctx.fillStyle = '#C8102E';
ctx.fillRect(0, 0, 1200, 3);

// Logo mark
ctx.save();
ctx.translate(155, 315);
// Ellipse ring
ctx.save();
ctx.rotate(-22 * Math.PI / 180);
ctx.strokeStyle = 'white';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.ellipse(0, 6, 52, 16, 0, 0, Math.PI * 2);
ctx.stroke();
ctx.restore();
// Left half
ctx.fillStyle = 'white';
ctx.beginPath();
ctx.moveTo(3, 0); ctx.lineTo(3, -38);
ctx.arc(0, 0, 38, -Math.PI/2, 0);
ctx.closePath();
ctx.fill();
// Right half
ctx.beginPath();
ctx.moveTo(-3, 0); ctx.lineTo(-3, 38);
ctx.arc(0, 0, 38, Math.PI/2, Math.PI);
ctx.closePath();
ctx.fill();
// Cross lines
ctx.strokeStyle = '#0A0A0A';
ctx.lineWidth = 5;
ctx.beginPath(); ctx.moveTo(0,-44); ctx.lineTo(0,44); ctx.stroke();
ctx.beginPath(); ctx.moveTo(-44,0); ctx.lineTo(44,0); ctx.stroke();
ctx.restore();

// Brand name
ctx.fillStyle = 'white';
ctx.font = '300 62px Georgia, serif';
ctx.fillText('Luminos', 235, 292);
ctx.fillStyle = 'rgba(255,255,255,0.55)';
ctx.font = '300 22px system-ui';
ctx.letterSpacing = '8px';
ctx.fillText('徕米诺', 238, 338);

// Divider
ctx.strokeStyle = '#2E2E2E';
ctx.lineWidth = 1;
ctx.beginPath(); ctx.moveTo(235, 368); ctx.lineTo(700, 368); ctx.stroke();

// Main title line 1
ctx.fillStyle = 'white';
ctx.font = '400 44px Georgia, serif';
ctx.fillText('Créer une société à Hong Kong', 235, 428);

// Main title line 2
ctx.fillStyle = '#C8102E';
ctx.font = '400 44px Georgia, serif';
ctx.fillText('en quelques clics !', 235, 482);

// Subtitle
ctx.fillStyle = '#6A6A6A';
ctx.font = '300 19px system-ui, sans-serif';
ctx.fillText('Enregistrement officiel  ·  Compte bancaire  ·  Dashboard client', 235, 538);

// Price badge
ctx.strokeStyle = 'rgba(200,16,46,0.35)';
ctx.lineWidth = 1;
ctx.fillStyle = 'rgba(200,16,46,0.1)';
roundRect(ctx, 860, 255, 230, 115, 4);
ctx.fill();
ctx.stroke();
ctx.fillStyle = '#C8102E';
ctx.font = '400 12px system-ui';
ctx.textAlign = 'center';
ctx.fillText('À PARTIR DE', 975, 300);
ctx.fillStyle = 'white';
ctx.font = '300 50px Georgia, serif';
ctx.fillText('$1,490', 975, 352);

// URL
ctx.fillStyle = '#3A3A3A';
ctx.font = '300 17px system-ui';
ctx.fillText('luminoscorp.com', 975, 540);

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// Export
const link = document.createElement('a');
link.download = 'og-image.png';
link.href = c.toDataURL('image/png');
link.click();
</script>
</body>
</html>
