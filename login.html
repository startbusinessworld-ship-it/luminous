<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started — Luminous</title>
<style>
:root{--red:#C8102E;--rd:#9B0B22;--blk:#0A0A0A;--d2:#181818;--d3:#222;--gr:#2E2E2E;--g2:#3A3A3A;--sv:#8A8A8A;--lt:#D4D4D4;--wh:#F5F5F5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--blk);color:var(--wh);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,16,46,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(200,16,46,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 60% at 50% 0%,rgba(200,16,46,0.07),transparent 70%);pointer-events:none;}
nav{padding:18px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.05);position:relative;z-index:10;}
.nav-back{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sv);text-decoration:none;display:flex;align-items:center;gap:7px;transition:color .3s;}
.nav-back:hover{color:var(--wh);}
.lang-bar{display:flex;gap:6px;}
.lang-opt{background:none;border:1px solid var(--gr);color:var(--sv);padding:4px 10px;border-radius:2px;font-size:.65rem;letter-spacing:.08em;cursor:pointer;font-family:inherit;transition:all .2s;}
.lang-opt:hover,.lang-opt.active{border-color:var(--red);color:var(--red);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.card{background:var(--d2);border:1px solid var(--gr);border-radius:6px;width:100%;max-width:460px;overflow:hidden;animation:fadeUp .5s ease both;}
.card-top{padding:36px 36px 28px;border-bottom:1px solid var(--gr);}
.eyebrow{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--red);}
h1{font-size:1.8rem;font-weight:400;color:var(--wh);line-height:1.15;}
.sub{font-size:.78rem;color:var(--sv);margin-top:8px;line-height:1.6;}
.card-body{padding:28px 36px;}
.tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--gr);}
.tab{flex:1;padding:9px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sv);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .3s;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit;text-align:center;}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.flbl{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sv);}
.finp{background:var(--d3);border:1px solid var(--gr);color:var(--wh);padding:11px 14px;font-size:.84rem;font-family:inherit;border-radius:2px;outline:none;transition:border-color .3s;width:100%;}
.finp:focus{border-color:var(--red);}
.finp::placeholder{color:var(--g2);}
.btn{width:100%;background:var(--red);color:#fff;padding:13px;font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;font-family:inherit;transition:all .3s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{background:var(--rd);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.alert{padding:11px 14px;border-radius:2px;font-size:.78rem;margin-bottom:14px;display:none;}
.alert.show{display:block;}
.alert-err{background:rgba(200,16,46,0.12);border:1px solid rgba(200,16,46,0.3);color:#ff7070;}
.wa-hint{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--sv);margin-top:-8px;margin-bottom:14px;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.btn.loading .spinner{display:block;}
.btn.loading .btn-txt{opacity:.6;}
footer{padding:18px 40px;text-align:center;font-size:.64rem;color:var(--g2);border-top:1px solid rgba(255,255,255,0.04);position:relative;z-index:1;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span data-t="nav.back">Back to site</span>
  </a>
  <div class="lang-bar">
    <button class="lang-opt" data-lang="en" onclick="setLangAll('en')">EN</button>
    <button class="lang-opt" data-lang="fr" onclick="setLangAll('fr')">FR</button>
    <button class="lang-opt" data-lang="es" onclick="setLangAll('es')">ES</button>
    <button class="lang-opt" data-lang="zh" onclick="setLangAll('zh')">中文</button>
  </div>
</nav>
<main>
  <div class="card">
    <div class="card-top">
      <div class="eyebrow" data-t="login.eyebrow">Get started</div>
      <h1 data-t="login.title">Create your account</h1>
      <p class="sub" data-t="login.sub">Register to access your client dashboard and proceed with your Hong Kong company.</p>
    </div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab active" id="tab-btn-register" onclick="switchTab('register')"><span data-t="login.tab.register">Create account</span></button>
        <button class="tab" id="tab-btn-login" onclick="switchTab('login')"><span data-t="login.tab.login">Already have an account</span></button>
      </div>
      <!-- REGISTER -->
      <div class="tab-panel active" id="tab-register">
        <div id="reg-alert" class="alert alert-err"></div>
        <div class="row2">
          <div class="fg">
            <label class="flbl" data-t="login.fname">First name</label>
            <input class="finp" id="reg-fname" type="text" data-t-ph="login.fname" placeholder="First name" autocomplete="given-name">
          </div>
          <div class="fg">
            <label class="flbl" data-t="login.lname">Last name</label>
            <input class="finp" id="reg-lname" type="text" data-t-ph="login.lname" placeholder="Last name" autocomplete="family-name">
          </div>
        </div>
        <div class="fg">
          <label class="flbl" data-t="login.email">Email address</label>
          <input class="finp" id="reg-email" type="email" placeholder="john@example.com" autocomplete="email">
        </div>
        <div class="fg">
          <label class="flbl" data-t="login.whatsapp">WhatsApp number</label>
          <input class="finp" id="reg-whatsapp" type="tel" placeholder="+1 234 567 8900" autocomplete="tel">
        </div>
        <div class="wa-hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <span data-t="login.whatsapp.hint">We'll contact you on WhatsApp to follow up on your file</span>
        </div>
        <div class="fg">
          <label class="flbl" data-t="login.password">Password</label>
          <input class="finp" id="reg-password" type="password" data-t-ph="login.password.hint" placeholder="Min. 8 characters" autocomplete="new-password">
        </div>
        <button class="btn" id="reg-btn" onclick="register()">
          <span class="btn-txt" data-t="login.btn.register">Create my account →</span>
          <div class="spinner"></div>
        </button>
      </div>
      <!-- LOGIN -->
      <div class="tab-panel" id="tab-login">
        <div id="login-alert" class="alert alert-err"></div>
        <div class="fg">
          <label class="flbl" data-t="login.email">Email address</label>
          <input class="finp" id="login-email" type="email" placeholder="john@example.com" autocomplete="email">
        </div>
        <div class="fg">
          <label class="flbl" data-t="login.password">Password</label>
          <input class="finp" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn" id="login-btn" onclick="login()">
          <span class="btn-txt" data-t="login.btn.login">Sign in →</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>
  </div>
</main>
<footer>© 2025 Luminous · 徕米诺 · Hong Kong Corporate Services</footer>

function getLang() {
  try { return localStorage.getItem('lum_lang') || 'en'; } catch(e) { return 'en'; }
}

function setLangAll(lang) {
  try { localStorage.setItem('lum_lang', lang); } catch(e) {}
  document.documentElement.lang = lang;
  document.body.className = lang === 'zh' ? 'lang-zh' : '';
  const dict = T[lang] || T['en'];
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (dict[key]) el.textContent = dict[key];
  });
  document.querySelectorAll('[data-t-ph]').forEach(el => {
    const key = el.getAttribute('data-t-ph');
    if (dict[key]) el.placeholder = dict[key];
  });
  // Update active lang button
  document.querySelectorAll('.lang-opt').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
}

function initLang() {
  setLangAll(getLang());
}

</script>

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-btn-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function setLoading(btn, loading) {
  if (loading) { btn.classList.add('loading'); btn.disabled = true; }
  else { btn.classList.remove('loading'); btn.disabled = false; }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function hideError(id) { document.getElementById(id).classList.remove('show'); }

async function register() {
  hideError('reg-alert');
  const lang = getLang();
  const d = T[lang] || T['en'];
  const fname = document.getElementById('reg-fname').value.trim();
  const lname = document.getElementById('reg-lname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const whatsapp = document.getElementById('reg-whatsapp').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!fname || !lname) { showError('reg-alert', d['login.err.name']); return; }
  if (!email) { showError('reg-alert', d['login.err.email']); return; }
  if (!whatsapp) { showError('reg-alert', d['login.err.whatsapp']); return; }
  if (password.length < 8) { showError('reg-alert', d['login.err.password']); return; }
  const btn = document.getElementById('reg-btn');
  setLoading(btn, true);
  const {data, error} = await SB.auth.signUp({ email, password, options: { data: { full_name: fname+' '+lname, first_name: fname, last_name: lname, whatsapp } } });
  if (error) { showError('reg-alert', error.message); setLoading(btn, false); return; }
  await SB.from('profiles').upsert({ id: data.user.id, email, full_name: fname+' '+lname, first_name: fname, last_name: lname, whatsapp, type: 'client', created_at: new Date().toISOString() });
  await SB.from('notifications').insert({ type: 'new_lead', message: 'New account: '+fname+' '+lname+' — '+email+' — WhatsApp: '+whatsapp, read: false, created_at: new Date().toISOString() });
  window.location.href = 'dashboard.html';
}

async function login() {
  hideError('login-alert');
  const lang = getLang();
  const d = T[lang] || T['en'];
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showError('login-alert', d['login.err.fields']); return; }
  const btn = document.getElementById('login-btn');
  setLoading(btn, true);
  const {error} = await SB.auth.signInWithPassword({ email, password });
  if (error) { showError('login-alert', d['login.err.invalid']); setLoading(btn, false); return; }
  window.location.href = 'dashboard.html';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('tab-register').classList.contains('active')) register();
    else login();
  }
});
</script>
